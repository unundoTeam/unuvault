name: UnuVaultIOSHost
options:
  minimumXcodeGenVersion: 2.45.0
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0"
targets:
  UnuVaultIOSHost:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: UnuVault
        CFBundleURLTypes:
          - CFBundleURLName: com.unuvault.ioshost.pairing
            CFBundleURLSchemes:
              - unuvault-ioshost
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: UnuVault uses your local network to pair this iPhone with your trusted Mac.
        UILaunchScreen: {}
    sources:
      - path: Sources
      - path: ../App/Sources/Features/Pairing/PairingInviteReceiveView.swift
      - path: ../App/Sources/Pairing/PairingPayload.swift
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.unuvault.ioshost
        PRODUCT_NAME: UnuVaultIOSHost
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  UnuVaultIOSHost:
    build:
      targets:
        UnuVaultIOSHost: all
    run:
      config: Debug
